services:
  runner:
    image: docker.io/barryallen26/minimal-runner:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # GitHub 仓库地址
      REPO_URL: https://github.com/Hawaiine/iptv-sources
      # Runner 名称（可选）
      RUNNER_NAME: iptv-wuhan
      # Runner 标签（可选，逗号分隔）
      RUNNER_LABELS: self-hosted,iptv,china
    volumes:
      - runner-work:/_work

volumes:
  runner-work: